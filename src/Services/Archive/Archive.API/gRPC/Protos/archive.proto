syntax = "proto3";

option csharp_namespace = "Archive.Grpc";

package archive;

service ArchiveProtoService {
  // Validation endpoints
  rpc CheckBandExists (CheckBandExistsRequest) returns (CheckBandExistsResponse);
  rpc CheckAlbumExists (CheckAlbumExistsRequest) returns (CheckAlbumExistsResponse);
}

// Band validation
message CheckBandExistsRequest {
  int32 band_id = 1;
}

message CheckBandExistsResponse {
  bool exists = 1;
  string band_name = 2; // Optional: для error messages
}

// Album validation
message CheckAlbumExistsRequest {
  int32 album_id = 1;
}

message CheckAlbumExistsResponse {
  bool exists = 1;
  string album_title = 2;
  string band_name = 3;
}