services:
  librarydb:
    image: postgres:16
    container_name: db-library
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=LibraryDb
    restart: always
    ports:
      - "5434:5432"
    volumes:
      - postgres_library:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  usercontentdb:
    image: postgres:16
    container_name: db-usercontent
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=UserContentDB
    restart: always
    ports:
      - "5435:5432"
    volumes:
      - postgres_usercontent:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  identitydb:
    image: postgres:16
    container_name: db-identity
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=IdentityDb
    restart: always
    ports:
      - "5436:5432"
    volumes:
      - postgres_identity:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  messagebroker:
    image: rabbitmq:management
    container_name: infra-rabbitmq
    hostname: blackenddeath
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  distributedcache:
    image: redis:7.2
    container_name: infra-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  seq:
    container_name: infra-seq
    restart: always
    ports:
      - "5341:5341"
      - "8082:80"
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=Admin123!
    volumes:
      - seq_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: infra-meilisearch
    restart: always
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=BlackEndDeathMasterKey123!
      - MEILI_ENV=development
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity.server:
    container_name: api-identity
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/home/app/.aspnet/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=DevPassword123!
      - ConnectionStrings__IdentityDb=Host=identitydb;Port=5432;Database=IdentityDb;Username=postgres;Password=postgres
      - IdentityServer__IssuerUri=https://localhost:6021
    restart: always
    ports:
      - "6020:8080"
      - "6021:8081"
    depends_on:
      identitydb:
        condition: service_healthy
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro
      - identity_dataprotection:/app/keys

  library.api:
    container_name: api-library
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_GCConserveMemory=7
      - ConnectionStrings__LibraryDb=Host=librarydb;Port=5432;Database=LibraryDb;Username=postgres;Password=postgres
      - MessageBroker__Host=amqp://messagebroker:5672
      - MessageBroker__UserName=guest
      - MessageBroker__Password=guest
      - Storage__BaseUrl=https://res.cloudinary.com
      - Storage__CloudName=dledijbyt
      - Storage__ApiKey=695255835435442
      - Storage__ApiSecret=IfARU4chBqqo_usv7spAL76YOL4
      - IdentityServer__Authority=http://identity.server:8080
      - Meilisearch__Url=http://meilisearch:7700
      - Meilisearch__ApiKey=BlackEndDeathMasterKey123!
      - Seq__ServerUrl=http://seq:5341
    depends_on:
      librarydb:
        condition: service_healthy
      messagebroker:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      identity.server:
        condition: service_started
    ports:
      - "6000:8080"
      - "6001:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

  activitydb:
    image: mongo:7
    container_name: db-activity
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_activity:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    container_name: infra-mongo-express
    restart: always
    ports:
      - "8083:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=root
      - ME_CONFIG_MONGODB_ADMINPASSWORD=root
      - ME_CONFIG_MONGODB_URL=mongodb://root:root@activitydb:27017
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      activitydb:
        condition: service_healthy

  notificationsdb:
    image: postgres:16
    container_name: db-notifications
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=NotificationsDB
    restart: always
    ports:
      - "5437:5432"
    volumes:
      - postgres_notifications:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  activity.api:
    container_name: api-activity
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_GCConserveMemory=7
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__MongoDB=mongodb://root:root@activitydb:27017
      - MongoDB__DatabaseName=activitydb
      - MessageBroker__Host=amqp://messagebroker:5672
      - MessageBroker__Username=guest
      - MessageBroker__Password=guest
      - Seq__ServerUrl=http://seq:5341
    depends_on:
      activitydb:
        condition: service_healthy
      messagebroker:
        condition: service_healthy
    ports:
      - "6060:8080"
      - "6061:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

  notifications.api:
    container_name: api-notifications
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_GCConserveMemory=7
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__NotificationsDB=Host=notificationsdb;Port=5432;Database=NotificationsDB;Username=postgres;Password=postgres
      - MessageBroker__Host=amqp://messagebroker:5672
      - MessageBroker__Username=guest
      - MessageBroker__Password=guest
    depends_on:
      notificationsdb:
        condition: service_healthy
      messagebroker:
        condition: service_healthy
    ports:
      - "6040:8080"
      - "6041:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

  usercontent.api:
    container_name: api-usercontent
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_GCConserveMemory=7
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__UserContentDB=Host=usercontentdb;Port=5432;Database=UserContentDB;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=distributedcache:6379,abortConnect=false
      - MessageBroker__Host=amqp://messagebroker:5672
      - MessageBroker__UserName=guest
      - MessageBroker__Password=guest
    depends_on:
      usercontentdb:
        condition: service_healthy
      distributedcache:
        condition: service_healthy
      messagebroker:
        condition: service_healthy
      library.api:
        condition: service_started
    ports:
      - "6010:8080"
      - "6011:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

  yarpapigateway:
    container_name: gw-yarp
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/home/app/.aspnet/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=DevPassword123!
      - IdentityServer__Authority=http://identity.server:8080
    depends_on:
      library.api:
        condition: service_started
      usercontent.api:
        condition: service_started
      identity.server:
        condition: service_started
    ports:
      - "6050:8080"
      - "6051:8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

  blackenddeath.ui:
    container_name: ui-blackenddeath
    restart: always
    ports:
      - "4200:80"
    depends_on:
      yarpapigateway:
        condition: service_started

volumes:
  mongo_activity:
  postgres_library:
  postgres_usercontent:
  postgres_notifications:
  postgres_identity:
  rabbitmq_data:
  identity_dataprotection:
  meilisearch_data:
  seq_data: